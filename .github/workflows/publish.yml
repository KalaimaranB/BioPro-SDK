name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build & Publish SDK
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for PyPI OIDC trusted publishing
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/github-action-pypi-publish@release/v1
