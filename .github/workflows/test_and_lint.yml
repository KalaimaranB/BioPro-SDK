name: Test, Lint & Type Check

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test-and-lint:
    name: Execute SDK Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up virtual environment and sync dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install pytest pytest-cov pytest-qt ruff mypy types-requests

      - name: Lint and Format Audit (Ruff)
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Static Type Check (Mypy)
        run: |
          uv run mypy src

      - name: Headless Unit Testing with Coverage Gates
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONPATH: src
        run: |
          uv run pytest
