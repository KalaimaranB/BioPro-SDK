name: Test, Lint & Type Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    name: Execute SDK Verification on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up virtual environment and sync dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install pytest pytest-cov pytest-qt ruff mypy types-requests

      - name: Lint and Format Audit (Ruff)
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Static Type Check (Mypy)
        run: |
          uv run mypy src

      - name: Headless Unit Testing with Coverage Gates
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONPATH: src
        run: |
          uv run pytest
