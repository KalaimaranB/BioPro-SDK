name: BioPro Standalone Plugin Release

on:
  workflow_call:
    secrets:
      BIOPRO_SIGNING_PRIVATE_KEY:
        required: true
      BIOPRO_SIGNING_DELEGATION:
        required: true

permissions:
  contents: write # Required to create releases and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install BioPro SDK & Test Suite
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip install --system biopro-sdk pytest pytest-qt PyQt6-headless

      - name: Run BioPro SDK QA Evaluation
        run: |
          python -m biopro sdk evaluate .

      - name: Run Plugin Unit Tests
        run: |
          pytest

      - name: Configure Cryptographic Signing Key and Delegation
        env:
          BIOPRO_SIGNING_PRIVATE_KEY: ${{ secrets.BIOPRO_SIGNING_PRIVATE_KEY }}
          BIOPRO_SIGNING_DELEGATION: ${{ secrets.BIOPRO_SIGNING_DELEGATION }}
        run: |
          if [ -z "$BIOPRO_SIGNING_PRIVATE_KEY" ]; then
            echo "ERROR: BIOPRO_SIGNING_PRIVATE_KEY GitHub Secret is missing!"
            exit 1
          fi
          if [ -z "$BIOPRO_SIGNING_DELEGATION" ]; then
            echo "ERROR: BIOPRO_SIGNING_DELEGATION GitHub Secret is missing!"
            exit 1
          fi
          mkdir -p ~/.biopro/dev_keys

          # Restore private key in both locations for compatibility
          echo "$BIOPRO_SIGNING_PRIVATE_KEY" > ~/.biopro/dev_private_key.pem
          echo "$BIOPRO_SIGNING_PRIVATE_KEY" > ~/.biopro/dev_keys/private.key
          chmod 600 ~/.biopro/dev_private_key.pem ~/.biopro/dev_keys/private.key

          # Restore delegation JSON
          echo "$BIOPRO_SIGNING_DELEGATION" > ~/.biopro/dev_keys/delegation.json
          chmod 600 ~/.biopro/dev_keys/delegation.json

          # Generate legacy dev_cert.bin from delegation JSON
          python3 -c "
          import json, os
          try:
              with open(os.path.expanduser('~/.biopro/dev_keys/delegation.json')) as f:
                  data = json.load(f)
                  link = data[0] if isinstance(data, list) else data
              subject_pub = bytes.fromhex(link['subject_pub'])
              signature = bytes.fromhex(link['signature'])
              with open(os.path.expanduser('~/.biopro/dev_cert.bin'), 'wb') as outf:
                  outf.write(subject_pub + signature)
              print('Successfully generated ~/.biopro/dev_cert.bin from delegation!')
          except Exception as e:
              print('Warning: Failed to generate dev_cert.bin: ' + str(e))
          "

      - name: Sign Plugin Manifest
        run: |
          python -m biopro sdk sign .

      - name: Package Plugin Archive
        run: |
          # Compress plugin files while excluding local caches, virtual environments, and git histories
          zip -r plugin.zip . -x ".git/*" ".github/*" ".venv/*" "venv/*" "__pycache__/*" "*.pyc" ".pytest_cache/*" ".vscode/*" ".idea/*"

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: plugin.zip
          draft: false
          prerelease: false
          generate_release_notes: true
